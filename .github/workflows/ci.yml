name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Parity test (prompt compilers)
        run: pnpm tsx trigger/lib/__tests__/single-prompt-parity.test.ts

      - name: Unit test (health score)
        run: pnpm tsx trigger/lib/__tests__/compute-health-score.test.ts

      - name: Unit test (webhook event resolver)
        run: pnpm tsx trigger/lib/__tests__/webhook-event-resolver.test.ts

      - name: Unit test (webhook HMAC)
        run: pnpm tsx trigger/lib/__tests__/webhook-hmac.test.ts

      - name: Unit test (engine-v1 ledger merge)
        run: pnpm tsx trigger/engine-v1/ledger/__tests__/merge-attributes.test.ts

      - name: Unit test (engine-v1 gate)
        run: pnpm tsx trigger/engine-v1/gate/__tests__/decide-gate.test.ts
